<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .quiz-container {
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .option {
      background: #ffffff;
      color: #000;
      padding: 10px;
      margin: 10px 0;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .option:hover {
      background: #00c6ff;
      color: white;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <h2 id="question">Question</h2>
  <div id="options"></div>
  <button class="btn" onclick="nextQuestion()">Next</button>
  <h3 id="result" class="hidden"></h3>
</div>

<script>
const quizData = [
  {
    question: "How often do you exercise?",
    options: ["Daily", "3-4 times/week", "Rarely", "Never"],
    score: [4,3,2,1]
  },
  {
    question: "How is your diet?",
    options: ["Balanced", "Moderate", "Junk food", "Very poor"],
    score: [4,3,2,1]
  },
  {
    question: "How much water do you drink?",
    options: ["3L+", "2L", "1L", "<1L"],
    score: [4,3,2,1]
  },
  {
    question: "Sleep duration?",
    options: ["7-8 hrs", "6 hrs", "5 hrs", "<5 hrs"],
    score: [4,3,2,1]
  },
  {
    question: "Do you track calories?",
    options: ["Always", "Sometimes", "Rarely", "Never"],
    score: [4,3,2,1]
  },
  {
    question: "Protein intake?",
    options: ["High", "Moderate", "Low", "Very low"],
    score: [4,3,2,1]
  },
  {
    question: "Do you do strength training?",
    options: ["Regularly", "Sometimes", "Rarely", "Never"],
    score: [4,3,2,1]
  },
  {
    question: "Cardio frequency?",
    options: ["Daily", "3x/week", "Rarely", "Never"],
    score: [4,3,2,1]
  },
  {
    question: "Stress level?",
    options: ["Low", "Moderate", "High", "Very high"],
    score: [4,3,2,1]
  },
  {
    question: "Consistency level?",
    options: ["Very consistent", "Moderate", "Inconsistent", "No routine"],
    score: [4,3,2,1]
  }
];


let currentQ = 0;
let totalScore = 0;
let selectedIndex = null;

function loadQuestion() {
  selectedIndex = null;

  const q = quizData[currentQ];
  document.getElementById("question").innerText = q.question;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((opt, index) => {
    const div = document.createElement("div");
    div.classList.add("option");
    div.innerText = opt;
    div.onclick = () => selectOption(index);
    optionsDiv.appendChild(div);
  });
}

function selectOption(index) {
  selectedIndex = index;

  const options = document.querySelectorAll(".option");

  options.forEach(opt => {
    opt.style.background = "#ffffff";
    opt.style.color = "#000";
  });

  options[index].style.background = "#00c6ff";
  options[index].style.color = "#fff";

  console.log("Selected:", quizData[currentQ].options[index]);
}

function nextQuestion() {
  if (selectedIndex === null) {
    alert("Please select an option first!");
    return;
  }
  if(currentQ < quizData.length)
  {totalScore += quizData[currentQ].score[selectedIndex];}
  currentQ++;

  if (currentQ < quizData.length) {
    loadQuestion();
  }else if(currentQ > quizData.length){
    window.location.href='/profile/profile.html';
  } else  {
    showResult();
  }
}

function showResult() {
  document.getElementById("question").classList.add("hidden");
  document.getElementById("options").classList.add("hidden");

  let feedback = "";

  if (totalScore > 35) {
    feedback = "🔥 Excellent! You're in top shape.";
  } else if (totalScore > 25) {
    feedback = "💪 Good! Improve consistency.";
  } else {
    feedback = "⚡ Focus more on fitness & diet.";
  }

  const result = document.getElementById("result");
  result.innerText = feedback;
  result.classList.remove("hidden");
}

loadQuestion();
</script>
</body>
</html>
